<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Açaí da Bara - Estoque</title>
  <style>
    /* ... (mantenha todos os estilos anteriores) ... */

    .edit-input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }

    .edit-buttons {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <!-- ... (mantenha toda a estrutura HTML anterior) ... -->

  <script>
    // ... (mantenha todas as variáveis e funções anteriores) ...

    // Função de Edição Atualizada
    function iniciarEdicao(id) {
      const linha = document.querySelector(`tr[data-id="${id}"]`);
      const dados = {
        produto: linha.cells[1].textContent,
        tipo: linha.cells[2].textContent,
        lote: linha.cells[3].textContent,
        quantidade: linha.cells[4].textContent
      };

      linha.innerHTML = `
        <td>${id}</td>
        <td><input class="edit-input" value="${dados.produto}" id="edit-produto"></td>
        <td><input class="edit-input" value="${dados.tipo}" id="edit-tipo"></td>
        <td><input class="edit-input" value="${dados.lote}" id="edit-lote"></td>
        <td><input class="edit-input" type="number" value="${dados.quantidade}" id="edit-quantidade"></td>
        <td>
          <div class="edit-buttons">
            <button class="btn-success" onclick="salvarEdicao('${id}')">Salvar</button>
            <button class="btn-danger" onclick="cancelarEdicao('${id}')">Cancelar</button>
          </div>
        </td>
      `;
    }

    async function salvarEdicao(id) {
      try {
        const novoProduto = document.getElementById('edit-produto').value.trim();
        const novoTipo = document.getElementById('edit-tipo').value.trim();
        const novoLote = document.getElementById('edit-lote').value.trim();
        const novaQuantidade = document.getElementById('edit-quantidade').value;

        if (!novoProduto || !novaQuantidade) {
          setMsg('msg', 'Produto e quantidade são obrigatórios!', true);
          return;
        }

        const res = await fetch(`${api}/estoque/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            produto: novoProduto,
            tipo: novoTipo,
            lote: novoLote,
            quantidade: Number(novaQuantidade)
          })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error);
        }

        setMsg('msg', 'Produto atualizado com sucesso!');
        await listar();
      } catch (error) {
        setMsg('msg', error.message, true);
      }
    }

    function cancelarEdicao(id) {
      listar();
    }

    // Função Listar Atualizada
    async function listar() {
      try {
        const res = await fetch(`${api}/estoque`);
        const data = await res.json();
        const tbody = document.getElementById('tabela-body');
        
        tbody.innerHTML = Object.entries(data).map(([id, item]) => `
          <tr data-id="${id}">
            <td>${id}</td>
            <td>${item.produto}</td>
            <td>${item.tipo}</td>
            <td>${item.lote}</td>
            <td>${item.quantidade}</td>
            <td class="actions-cell">
              <button class="btn-primary" onclick="iniciarEdicao('${id}')">Editar</button>
              <button class="btn-danger" onclick="remover('${id}')">Remover</button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        setMsg('msg', 'Erro ao carregar estoque', true);
      }
    }

    // ... (mantenha o restante do código) ...
  </script>
</body>
</html>
