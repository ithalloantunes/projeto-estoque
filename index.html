<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Estoque – Açaí da Bara</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    input, button { padding: 6px; margin: 4px; }
    .edit-input { width: 90%; padding: 4px; }
    #auth { background: #f5f5f5; padding: 20px; border-radius: 5px; }
    #main { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Sistema de Estoque – Açaí da Bara</h1>

  <!-- Seção de Login/Cadastro -->
  <div id="auth">
    <div style="display: flex; gap: 30px;">
      <div>
        <h2>Login</h2>
        <input id="loginUser" placeholder="Usuário">
        <input id="loginPass" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
      </div>
      <div>
        <h2>Cadastro</h2>
        <input id="regUser" placeholder="Novo usuário">
        <input id="regPass" type="password" placeholder="Nova senha">
        <button onclick="register()">Cadastrar</button>
      </div>
    </div>
    <p id="authMsg" style="color: red; margin-top: 10px;"></p>
  </div>

  <!-- Seção Principal -->
  <div id="main" class="hidden">
    <button onclick="logout()" style="float: right;">Sair</button>
    <h2>Controle de Estoque</h2>

    <!-- Formulário de Adição -->
    <div>
      <h3>Adicionar Produto</h3>
      <input id="produto" placeholder="Produto">
      <input id="tipo" placeholder="Tipo">
      <input id="lote" placeholder="Lote">
      <input id="quantidade" type="number" placeholder="Quantidade">
      <button onclick="adicionar()">Adicionar</button>
    </div>

    <!-- Tabela de Estoque -->
    <h3>Estoque</h3>
    <table id="tabela">
      <thead>
        <tr>
          <th>ID</th>
          <th>Produto</th>
          <th>Tipo</th>
          <th>Lote</th>
          <th>Qtd</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p id="msg"></p>
  </div>

  <script>
    const api = '/api';
    let userId = null;
    let editingId = null;

    // Funções de Autenticação
    async function register() {
      try {
        const username = document.getElementById('regUser').value;
        const password = document.getElementById('regPass').value;
        
        const res = await fetch(`${api}/register`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username, password})
        });
        
        const json = await res.json();
        setMsg('authMsg', json.error || json.message);
      } catch (error) {
        setMsg('authMsg', 'Erro no cadastro');
      }
    }

    async function login() {
      try {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        
        const res = await fetch(`${api}/login`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username, password})
        });
        
        const json = await res.json();
        if (json.error) {
          setMsg('authMsg', json.error);
        } else {
          userId = json.userId;
          hide('auth'); 
          show('main');
          listar();
        }
      } catch (error) {
        setMsg('authMsg', 'Erro de conexão');
      }
    }

    function logout() {
      userId = null;
      hide('main');
      show('auth');
    }

    // Funções de Estoque (Mantidas as melhorias anteriores)
    // ... [Manter todas as funções de estoque do código anterior] ...

    // Funções auxiliares
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function setMsg(id, txt) { document.getElementById(id).innerText = txt; }

    // Inicialização
    document.addEventListener('DOMContentLoaded', () => {
      hide('main');
    });
  </script>
</body>
</html>
