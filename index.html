<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="/estilos.css">
</head>
<body>
    <!-- Tela de login/cadastro, visível inicialmente -->
    <div id="login-container" class="login">
        <img id="monster" src="img/idle/1.png" alt="Monster">
        <div class="formulario" id="login-form">
            <h2>Login</h2>
            <label>Usuário</label>
            <input type="text" id="input-usuario" required>
            <label>Senha</label>
            <input type="password" id="input-clave" required>
            <button type="submit">Entrar</button>
            <button type="button" id="show-register">Cadastrar</button>
        </div>
        <div class="formulario hidden" id="register-form">
            <h2>Cadastro</h2>
            <label>Usuário</label>
            <input type="text" id="register-username" required>
            <label>Senha</label>
            <input type="password" id="register-password" required>
            <button type="submit">Cadastrar</button>
            <button type="button" id="show-login">Voltar ao Login</button>
        </div>
    </div>

    <!-- Tela de estoque, oculta até o login ser confirmado -->
    <div id="stock-container" class="hidden">
        <header>
            <h1>Controle de Estoque</h1>
            <button id="logout-btn">Sair</button>
        </header>

        <section id="form-section">
            <h2>Adicionar Novo Produto</h2>
            <form id="stock-form">
                <input type="text" id="produto" placeholder="Produto" required>
                <input type="text" id="tipo" placeholder="Tipo">
                <input type="text" id="lote" placeholder="Lote">
                <input type="date" id="validade" placeholder="Validade">
                <input type="number" id="quantidade" placeholder="Quantidade" required>
                <button type="submit">Adicionar Produto</button>
            </form>
        </section>

        <table id="stock-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Tipo</th>
                    <th>Lote</th>
                    <th>Validade</th>
                    <th>Quantidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="stock-table-body"></tbody>
        </table>
    </div>

    <script src="/javascript.js"></script>
</body>
</html>
