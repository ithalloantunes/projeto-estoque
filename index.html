<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sistema de Estoque – Açaí da Bara</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    input, button { padding: 6px; margin: 4px; }
    button { cursor: pointer; }
    #msg { color: #d9534f; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Sistema de Estoque – Açaí da Bara</h1>

  <div id="auth">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Usuário" />
    <input id="loginPass" type="password" placeholder="Senha" />
    <button onclick="login()">Entrar</button>
    <h2>Cadastro</h2>
    <input id="regUser" placeholder="Novo usuário" />
    <input id="regPass" type="password" placeholder="Nova senha" />
    <button onclick="register()">Cadastrar</button>
    <p id="authMsg"></p>
  </div>

  <div id="main" class="hidden">
    <button onclick="logout()">Sair</button>
    <h2>Controle de Estoque</h2>
    <div>
      <input id="filtroNome" placeholder="Buscar por produto" />
      <button onclick="buscar()">Buscar</button>
      <button onclick="listar()">Listar Tudo</button>
      <button onclick="relatorio()">Gerar Relatório</button>
    </div>
    <div>
      <h3>Adicionar/Atualizar</h3>
      <input id="produto" placeholder="Produto" />
      <input id="tipo" placeholder="Tipo" />
      <input id="lote" placeholder="Lote" />
      <input id="quantidade" type="number" placeholder="Quantidade" />
      <button onclick="adicionar()">Adicionar</button>
      <button onclick="atualizar()">Atualizar</button>
      <input id="updateId" placeholder="ID para atualizar" />
    </div>
    <h3>Estoque</h3>
    <table id="tabela">
      <thead>
        <tr>
          <th>ID</th>
          <th>Produto</th>
          <th>Tipo</th>
          <th>Lote</th>
          <th>Qtd</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p id="msg"></p>
  </div>

  <script>
    const api = '/api';
    let userId = null;

    // Funções auxiliares
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function setMsg(id, txt) { document.getElementById(id).innerText = txt; }

    // Autenticação (mantidas como no original)
    async function register() {
      try {
        const username = document.getElementById('regUser').value;
        const password = document.getElementById('regPass').value;
        const res = await fetch(`${api}/register`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username, password})
        });
        const json = await res.json();
        setMsg('authMsg', json.error || json.message);
      } catch (error) {
        setMsg('authMsg', 'Erro no cadastro');
      }
    }

    async function login() {
      try {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        const res = await fetch(`${api}/login`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username, password})
        });
        const json = await res.json();
        if (json.error) {
          setMsg('authMsg', json.error);
        } else {
          userId = json.userId;
          hide('auth'); 
          show('main');
          listar();
        }
      } catch (error) {
        setMsg('authMsg', 'Erro de conexão');
      }
    }

    function logout() {
      userId = null;
      hide('main'); 
      show('auth');
    }

    // ===== FUNÇÕES DE ESTOQUE (COMPLETAS) =====
    async function listar() {
      try {
        const res = await fetch(`${api}/estoque`);
        const data = await res.json();
        preencherTabela(data);
        setMsg('msg', 'Estoque atualizado');
      } catch (error) {
        setMsg('msg', 'Erro ao carregar estoque');
      }
    }

    async function adicionar() {
      try {
        const produto = document.getElementById('produto').value;
        const quantidade = document.getElementById('quantidade').value;

        if (!produto || !quantidade) {
          setMsg('msg', 'Preencha produto e quantidade!');
          return;
        }

        const novoItem = {
          produto: produto,
          tipo: document.getElementById('tipo').value,
          lote: document.getElementById('lote').value,
          quantidade: parseInt(quantidade)
        };

        const res = await fetch(`${api}/estoque`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(novoItem)
        });

        if (!res.ok) throw new Error('Falha ao adicionar');

        setMsg('msg', '✔ Produto adicionado!');
        listar();
        // Limpa campos
        document.getElementById('produto').value = '';
        document.getElementById('quantidade').value = '';
      } catch (error) {
        setMsg('msg', `Erro: ${error.message}`);
      }
    }

    async function atualizar() {
      try {
        const id = document.getElementById('updateId').value;
        const quantidade = document.getElementById('quantidade').value;

        if (!id || !quantidade) {
          setMsg('msg', 'Preencha ID e quantidade!');
          return;
        }

        const res = await fetch(`${api}/estoque/${id}`, {
          method: 'PUT',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({quantidade: parseInt(quantidade)})
        });

        if (!res.ok) throw new Error('Falha ao atualizar');

        setMsg('msg', '✔ Quantidade atualizada!');
        listar();
      } catch (error) {
        setMsg('msg', `Erro: ${error.message}`);
      }
    }

    async function remover(id) {
      if (!confirm('Tem certeza que deseja remover?')) return;
      
      try {
        const res = await fetch(`${api}/estoque/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Falha ao remover');
        setMsg('msg', '✔ Produto removido!');
        listar();
      } catch (error) {
        setMsg('msg', `Erro: ${error.message}`);
      }
    }

    async function buscar() {
      try {
        const termo = document.getElementById('filtroNome').value;
        if (!termo) return listar();

        const res = await fetch(`${api}/estoque/buscar/${termo}`);
        const data = await res.json();
        preencherTabela(data);
        setMsg('msg', `Resultados para: "${termo}"`);
      } catch (error) {
        setMsg('msg', 'Erro na busca');
      }
    }

    async function relatorio() {
      try {
        const res = await fetch(`${api}/estoque/relatorio`);
        const data = await res.json();
        
        // Converte array para objeto para usar a mesma função de tabela
        const dataObj = data.reduce((acc, item, index) => {
          acc[`rel-${index}`] = item;
          return acc;
        }, {});
        
        preencherTabela(dataObj);
        setMsg('msg', 'Relatório gerado (ordenado por quantidade)');
      } catch (error) {
        setMsg('msg', 'Erro ao gerar relatório');
      }
    }

    function preencherTabela(data) {
      const tbody = document.querySelector('#tabela tbody');
      tbody.innerHTML = '';

      for (const [id, item] of Object.entries(data)) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${id}</td>
          <td>${item.produto || '-'}</td>
          <td>${item.tipo || '-'}</td>
          <td>${item.lote || '-'}</td>
          <td>${item.quantidade || 0}</td>
          <td><button onclick="remover('${id}')">Remover</button></td>`;
        tbody.appendChild(tr);
      }
    }
  </script>
</body>
</html>
