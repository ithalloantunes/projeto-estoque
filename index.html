<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Estoque – Açaí da Bara</title>
  <style>
    /* Manter os estilos anteriores */
  </style>
</head>
<body>
  <!-- Manter a estrutura HTML anterior -->

  <script>
    const api = '/api';
    let userId = null;

    // Funções de utilitárias
    const show = (id) => document.getElementById(id).classList.remove('hidden');
    const hide = (id) => document.getElementById(id).classList.add('hidden');
    const setMsg = (id, txt) => document.getElementById(id).textContent = txt;

    // Função adicionar atualizada
    async function adicionar() {
      try {
        const produto = document.getElementById('produto');
        const quantidade = document.getElementById('quantidade');
        
        // Validação reforçada
        if (!produto.value.trim() || !quantidade.value || isNaN(quantidade.value)) {
          setMsg('msg', 'Preencha todos os campos obrigatórios!');
          produto.focus();
          return;
        }

        const body = {
          produto: produto.value.trim(),
          tipo: document.getElementById('tipo').value.trim(),
          lote: document.getElementById('lote').value.trim(),
          quantidade: parseInt(quantidade.value)
        };

        const res = await fetch(`${api}/estoque`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
        
        // Limpar campos após sucesso
        ['produto', 'tipo', 'lote', 'quantidade'].forEach(id => {
          document.getElementById(id).value = '';
        });
        
        setMsg('msg', '✔ Produto adicionado com sucesso!');
        listar();
      } catch (error) {
        setMsg('msg', `❌ Erro: ${error.message}`);
        console.error('Erro:', error);
      }
    }

    // Manter outras funções (login, registro, listar, etc.)
  </script>
</body>
</html>
