<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div id="login-container" class="login">
        <img id="monster" src="img/idle/1.png" alt="Monster">
        <div id="login-form" class="formulario">
            <h2>Login</h2>
            <label for="input-usuario">Usuário</label>
            <input type="text" id="input-usuario" placeholder="Digite seu usuário">
            <label for="input-clave">Senha</label>
            <input type="password" id="input-clave" placeholder="Digite sua senha">
            <button onclick="handleLogin()">Entrar</button>
            <button onclick="showRegisterForm()">Cadastrar</button>
        </div>

        <div id="register-form" class="formulario" style="display: none;">
            <h2>Cadastro</h2>
            <label for="register-username">Usuário</label>
            <input type="text" id="register-username" placeholder="Digite seu usuário">
            <label for="register-password">Senha</label>
            <input type="password" id="register-password" placeholder="Digite sua senha">
            <button onclick="handleRegister()">Cadastrar</button>
            <button onclick="showLoginForm()">Voltar ao Login</button>
        </div>
    </div>

    <div id="stock-container" style="display: none;">
        <header>
            <h1>Controle de Estoque</h1>
            <button onclick="logout()">Sair</button>
        </header>

        <section id="form-section">
            <h2>Adicionar Novo Produto</h2>
            <form id="stock-form">
                <input type="text" id="produto" placeholder="Produto" required>
                <input type="text" id="tipo" placeholder="Tipo">
                <input type="text" id="lote" placeholder="Lote">
                <input type="date" id="validade" placeholder="Validade">
                <input type="number" id="quantidade" placeholder="Quantidade" required>
                <button type="submit">Adicionar Produto</button>
            </form>
        </section>

        <section id="stock-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Tipo</th>
                        <th>Lote</th>
                        <th>Validade</th>
                        <th>Quantidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="stock-table-body"></tbody>
            </table>
        </section>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
