<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Açaí da Bara - Estoque</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      background-color: #6a1b9a;
      color: white;
      padding: 1rem 0;
      text-align: center;
      margin-bottom: 2rem;
      border-radius: 8px;
    }

    h1 {
      font-size: 2rem;
    }

    .msg {
      padding: 0.75rem;
      margin-bottom: 1rem;
      border-radius: 4px;
      text-align: center;
    }

    .msg-error {
      background-color: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    .msg-success {
      background-color: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn-primary {
      background-color: #6a1b9a;
      color: white;
    }

    .btn-primary:hover {
      background-color: #7b1fa2;
    }

    .btn-danger {
      background-color: #c62828;
      color: white;
    }

    .btn-danger:hover {
      background-color: #d32f2f;
    }

    .btn-success {
      background-color: #2e7d32;
      color: white;
    }

    .btn-success:hover {
      background-color: #388e3c;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 2rem;
      background-color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #6a1b9a;
      color: white;
    }

    tr:hover {
      background-color: #f5f5f5;
    }

    .actions-cell {
      display: flex;
      gap: 0.5rem;
    }

    .edit-input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }

    .edit-buttons {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Açaí da Bara - Controle de Estoque</h1>
    </header>

    <div id="msg" class="msg"></div>

    <form id="form-produto">
      <div class="form-group">
        <label for="produto">Produto</label>
        <input type="text" id="produto" required>
      </div>

      <div class="form-group">
        <label for="tipo">Tipo</label>
        <input type="text" id="tipo">
      </div>

      <div class="form-group">
        <label for="lote">Lote</label>
        <input type="text" id="lote">
      </div>

      <div class="form-group">
        <label for="quantidade">Quantidade</label>
        <input type="number" id="quantidade" required>
      </div>

      <button type="submit" class="btn btn-primary">Adicionar</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Produto</th>
          <th>Tipo</th>
          <th>Lote</th>
          <th>Quantidade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela-body"></tbody>
    </table>
  </div>

  <script>
    const api = '/api';
    let userId = null;

    // Funções auxiliares
    function setMsg(id, msg, isError = false) {
      const element = document.getElementById(id);
      element.textContent = msg;
      element.className = isError ? 'msg msg-error' : 'msg msg-success';
      setTimeout(() => element.textContent = '', 5000);
    }

    // Event Listeners
    document.getElementById('form-produto').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      try {
        const produto = document.getElementById('produto').value.trim();
        const tipo = document.getElementById('tipo').value.trim();
        const lote = document.getElementById('lote').value.trim();
        const quantidade = document.getElementById('quantidade').value;

        if (!produto || !quantidade) {
          setMsg('msg', 'Produto e quantidade são obrigatórios!', true);
          return;
        }

        const res = await fetch(`${api}/estoque`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ produto, tipo, lote, quantidade })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error);
        }

        setMsg('msg', 'Produto adicionado com sucesso!');
        document.getElementById('form-produto').reset();
        await listar();
      } catch (error) {
        setMsg('msg', error.message, true);
      }
    });

    // Funções de Edição Atualizada
    function iniciarEdicao(id) {
      const linha = document.querySelector(`tr[data-id="${id}"]`);
      const dados = {
        produto: linha.cells[1].textContent,
        tipo: linha.cells[2].textContent,
        lote: linha.cells[3].textContent,
        quantidade: linha.cells[4].textContent
      };

      linha.innerHTML = `
        <td>${id}</td>
        <td><input class="edit-input" value="${dados.produto}" id="edit-produto"></td>
        <td><input class="edit-input" value="${dados.tipo}" id="edit-tipo"></td>
        <td><input class="edit-input" value="${dados.lote}" id="edit-lote"></td>
        <td><input class="edit-input" type="number" value="${dados.quantidade}" id="edit-quantidade"></td>
        <td>
          <div class="edit-buttons">
            <button class="btn btn-success" onclick="salvarEdicao('${id}')">Salvar</button>
            <button class="btn btn-danger" onclick="cancelarEdicao('${id}')">Cancelar</button>
          </div>
        </td>
      `;
    }

    async function salvarEdicao(id) {
      try {
        const novoProduto = document.getElementById('edit-produto').value.trim();
        const novoTipo = document.getElementById('edit-tipo').value.trim();
        const novoLote = document.getElementById('edit-lote').value.trim();
        const novaQuantidade = document.getElementById('edit-quantidade').value;

        if (!novoProduto || !novaQuantidade) {
          setMsg('msg', 'Produto e quantidade são obrigatórios!', true);
          return;
        }

        const res = await fetch(`${api}/estoque/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            produto: novoProduto,
            tipo: novoTipo,
            lote: novoLote,
            quantidade: Number(novaQuantidade)
          })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error);
        }

        setMsg('msg', 'Produto atualizado com sucesso!');
        await listar();
      } catch (error) {
        setMsg('msg', error.message, true);
      }
    }

    function cancelarEdicao(id) {
      listar();
    }

    // Função Listar Atualizada
    async function listar() {
      try {
        const res = await fetch(`${api}/estoque`);
        const data = await res.json();
        const tbody = document.getElementById('tabela-body');
        
        tbody.innerHTML = Object.entries(data).map(([id, item]) => `
          <tr data-id="${id}">
            <td>${id}</td>
            <td>${item.produto}</td>
            <td>${item.tipo}</td>
            <td>${item.lote}</td>
            <td>${item.quantidade}</td>
            <td class="actions-cell">
              <button class="btn btn-primary" onclick="iniciarEdicao('${id}')">Editar</button>
              <button class="btn btn-danger" onclick="remover('${id}')">Remover</button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        setMsg('msg', 'Erro ao carregar estoque', true);
      }
    }

    // Função Remover
    async function remover(id) {
      try {
        if (!confirm('Tem certeza que deseja remover este produto?')) return;

        const res = await fetch(`${api}/estoque/${id}`, {
          method: 'DELETE'
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error);
        }

        setMsg('msg', 'Produto removido com sucesso!');
        await listar();
      } catch (error) {
        setMsg('msg', error.message, true);
      }
    }

    // Inicialização
    document.addEventListener('DOMContentLoaded', () => {
      listar();
    });
  </script>
</body>
</html>
