<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Açaí da Bara - Estoque</title>
  <style>
    /* ... (mantenha todos os estilos anteriores) ... */

    /* Novos estilos para autenticação */
    .auth-container {
      max-width: 400px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .auth-toggle {
      text-align: center;
      margin-top: 1rem;
      cursor: pointer;
      color: #6a1b9a;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Seção de Autenticação -->
    <div id="authSection" class="auth-container">
      <div id="loginForm">
        <h2>Login</h2>
        <div class="form-group">
          <label for="loginUsername">Usuário</label>
          <input type="text" id="loginUsername" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Senha</label>
          <input type="password" id="loginPassword" required>
        </div>
        <button class="btn btn-primary" onclick="loginUser()">Entrar</button>
        <div class="auth-toggle" onclick="showRegister()">Criar nova conta</div>
      </div>

      <div id="registerForm" class="hidden">
        <h2>Cadastro</h2>
        <div class="form-group">
          <label for="regUsername">Usuário</label>
          <input type="text" id="regUsername" required>
        </div>
        <div class="form-group">
          <label for="regPassword">Senha</label>
          <input type="password" id="regPassword" required>
        </div>
        <button class="btn btn-primary" onclick="registerUser()">Cadastrar</button>
        <div class="auth-toggle" onclick="showLogin()">Já tenho uma conta</div>
      </div>
    </div>

    <!-- Conteúdo principal (visível apenas após login) -->
    <div id="mainContent" class="hidden">
      <header>
        <h1>Açaí da Bara - Controle de Estoque</h1>
        <button class="btn btn-danger" onclick="logout()" style="margin-top: 1rem;">Sair</button>
      </header>

      <!-- ... (mantenha o restante do conteúdo anterior) ... -->
    </div>
  </div>

  <script>
    const api = '/api';
    let userId = null;

    // Funções de Autenticação
    async function loginUser() {
      try {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        const res = await fetch(`${api}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        userId = data.userId;
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
      } catch (error) {
        setMsg('msg', error.message, true);
      }
    }

    async function registerUser() {
      try {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();

        const res = await fetch(`${api}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error);
        }

        setMsg('msg', 'Cadastro realizado com sucesso!');
        showLogin();
      } catch (error) {
        setMsg('msg', error.message, true);
      }
    }

    function logout() {
      userId = null;
      document.getElementById('mainContent').classList.add('hidden');
      document.getElementById('authSection').classList.remove('hidden');
      document.getElementById('loginForm').reset();
    }

    function showRegister() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    }

    function showLogin() {
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
    }

    // ... (mantenha as funções anteriores de estoque, setMsg, listar, edição, etc) ...
  </script>
</body>
</html>
