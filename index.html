<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="[invalid url, do not cite] rel="stylesheet">
</head>
<body>
    <div class="login" id="login-container">
        <img src="img/idle/1.png" alt="Monster" id="monster">
        <form id="login-form">
            <h2>Login</h2>
            <label for="input-usuario">Nome de Usuário (Login)</label>
            <div class="input-container">
                <input type="text" id="input-usuario" placeholder="Digite seu usuário">
            </div>
            <label for="input-clave">Senha de Acesso</label>
            <div class="input-container">
                <input type="password" id="input-clave" placeholder="Digite sua senha">
                <button type="button" id="toggle-password-login" class="toggle-password">
                    <svg class="eye-icon show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg class="eye-icon hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" style="display: none;">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </button>
            </div>
            <button type="submit">Entrar</button>
            <button type="button" id="show-register">Cadastrar</button>
        </form>

        <form id="register-form" class="hidden">
            <h2>Cadastro</h2>
            <label for="register-username">Nome de Usuário (Login)</label>
            <div class="input-container">
                <input type="text" id="register-username" placeholder="Digite seu usuário">
            </div>
            <label for="register-password">Senha de Acesso</label>
            <div class="input-container">
                <input type="password" id="register-password" placeholder="Digite sua senha">
                <button type="button" id="toggle-password-register" class="toggle-password">
                    <svg class="eye-icon show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg class="eye-icon hide" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" style="display: none;">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </button>
            </div>
            <button type="submit">Cadastrar</button>
            <button type="button" id="show-login">Voltar ao Login</button>
        </form>
    </div>

    <div id="stock-container" class="hidden">
        <header>
            <h1>Controle de Estoque</h1>
            <span id="logged-in-user"></span>
            <button id="logout-btn">Sair</button>
        </header>
        <section id="form-section">
            <h2>Adicionar Novo Produto</h2>
            <form id="stock-form">
                <input type="text" id="produto" placeholder="Produto" required>
                <input type="text" id="tipo" placeholder="Tipo">
                <input type="text" id="lote" placeholder="Lote">
                <input type="date" id="validade" placeholder="Validade">
                <input type="number" id="quantidade" placeholder="Quantidade" required>
                <button type="submit">Adicionar Produto</button>
            </form>
        </section>
        <section id="stock-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Tipo</th>
                        <th>Lote</th>
                        <th>Validade</th>
                        <th>Quantidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="stock-table-body"></tbody>
            </table>
        </section>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
