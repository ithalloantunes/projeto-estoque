<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Açaí da Barra - Estoque</title>
  <link rel="stylesheet" href="estilos.css">
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="formulario" style="width: 100%;">
      <h1>Açaí da Barra</h1>
      <h2>- Estoque</h2>
      <div class="login" id="login-container">
        <div class="formulario" id="login-form">
          <label for="input-usuario">Nome de Usuário (Login)</label>
          <div class="input-container">
            <input type="text" id="input-usuario" placeholder="Digite seu usuário">
          </div>

          <label for="input-clave">Senha de Acesso</label>
          <div class="input-container">
            <input type="password" id="input-clave" placeholder="Digite sua senha">
            <button type="button" id="toggle-password"></button>
          </div>

          <button id="btn-entrar">Entrar</button>

          <div class="social">
            <button class="google">Continuar com Google</button>
            <button class="apple">Continuar com Apple</button>
            <button class="facebook">Continuar com Facebook</button>
          </div>
        </div>
      </div>

      <section id="estoque-container" style="display: none;">
        <h2>Controle de Estoque</h2>
        <!-- Aqui mantemos o que já existia antes na interface de estoque -->
        <div id="estoque-conteudo">
          <!-- Conteúdo real do estoque vem do JavaScript -->
        </div>
      </section>
    </div>
  </div>

  <script src="javascript.js"></script>
</body>
</html>
