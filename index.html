<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Estoque – Açaí da Bara</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
    .hidden { display: none; }
    table { border-collapse: collapse; width: 100%; margin: 15px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    input, button { padding: 8px; margin: 5px 0; }
    button { cursor: pointer; background-color: #4CAF50; color: white; border: none; }
    button:hover { background-color: #45a049; }
    #authMsg, #msg { padding: 10px; margin: 10px 0; border-radius: 4px; }
    #authMsg { background-color: #ffdddd; border-left: 6px solid #f44336; }
    #msg { background-color: #ddffdd; border-left: 6px solid #4CAF50; }
    .error { color: #f44336; }
    .success { color: #4CAF50; }
  </style>
</head>
<body>
  <!-- Cabeçalho -->
  <h1>Sistema de Estoque – Açaí da Bara</h1>

  <!-- Seção de Autenticação -->
  <div id="auth">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Usuário" required>
    <input id="loginPass" type="password" placeholder="Senha" required>
    <button onclick="login()">Entrar</button>

    <h2>Cadastro</h2>
    <input id="regUser" placeholder="Novo usuário" required>
    <input id="regPass" type="password" placeholder="Nova senha" required>
    <button onclick="register()">Cadastrar</button>
    
    <p id="authMsg"></p>
  </div>

  <!-- Seção Principal (estoque) -->
  <div id="main" class="hidden">
    <button onclick="logout()" style="background-color: #f44336;">Sair</button>
    <h2>Controle de Estoque</h2>
    
    <!-- Barra de ferramentas -->
    <div style="margin: 15px 0;">
      <input id="filtroNome" placeholder="Buscar por produto">
      <button onclick="buscar()">Buscar</button>
      <button onclick="listar()">Listar Tudo</button>
      <button onclick="relatorio()">Gerar Relatório</button>
    </div>
    
    <!-- Formulário de adição/atualização -->
    <div style="background: #f9f9f9; padding: 15px; border-radius: 4px;">
      <h3>Adicionar/Atualizar</h3>
      <input id="produto" placeholder="Produto *" required>
      <input id="tipo" placeholder="Tipo">
      <input id="lote" placeholder="Lote">
      <input id="quantidade" type="number" placeholder="Quantidade *" required>
      <button onclick="adicionar()">Adicionar</button>
      <button onclick="atualizar()">Atualizar</button>
      <input id="updateId" placeholder="ID para atualizar">
    </div>
    
    <!-- Tabela de estoque -->
    <h3>Estoque</h3>
    <table id="tabela">
      <thead>
        <tr>
          <th>ID</th>
          <th>Produto</th>
          <th>Tipo</th>
          <th>Lote</th>
          <th>Qtd</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    
    <!-- Mensagens de status -->
    <p id="msg"></p>
  </div>

  <script>
    const api = '/api';
    let userId = null;

    // Utilitários
    const show = (id) => document.getElementById(id).classList.remove('hidden');
    const hide = (id) => document.getElementById(id).classList.add('hidden');
    const setMsg = (id, txt, isError = false) => {
      const elem = document.getElementById(id);
      elem.innerText = txt;
      elem.className = isError ? 'error' : 'success';
    };

    // Autenticação
    async function register() {
      try {
        const username = document.getElementById('regUser').value.trim();
        const password = document.getElementById('regPass').value.trim();
        
        if (!username || !password) {
          setMsg('authMsg', 'Preencha usuário e senha!', true);
          return;
        }

        const res = await fetch(`${api}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Erro desconhecido');
        }

        setMsg('authMsg', 'Cadastro realizado com sucesso!');
      } catch (error) {
        setMsg('authMsg', `Erro: ${error.message}`, true);
      }
    }

    async function login() {
      try {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        
        if (!username || !password) {
          setMsg('authMsg', 'Preencha usuário e senha!', true);
          return;
        }

        const res = await fetch(`${api}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Credenciais inválidas');
        }

        userId = data.userId;
        hide('auth');
        show('main');
        await listar();
      } catch (error) {
        setMsg('authMsg', `Erro: ${error.message}`, true);
      }
    }

    function logout() {
      userId = null;
      hide('main');
      show('auth');
    }

    // Funções de Estoque (Robustas)
    async function listar() {
      try {
        console.log('Iniciando listagem de estoque...');
        setMsg('msg', 'Carregando estoque...');
        
        const res = await fetch(`${api}/estoque`);
        
        if (!res.ok) {
          const error = await res.json().catch(() => null);
          throw new Error(error?.error || `Erro HTTP ${res.status}`);
        }

        const data = await res.json();
        console.log('Dados recebidos:', data);
        
        if (!data || typeof data !== 'object') {
          throw new Error('Formato de dados inválido');
        }

        preencherTabela(data);
        setMsg('msg', 'Estoque carregado com sucesso');
      } catch (error) {
        console.error('Erro ao listar:', error);
        setMsg('msg', `Falha: ${error.message}`, true);
      }
    }

    async function adicionar() {
      try {
        const produto = document.getElementById('produto').value.trim();
        const quantidade = document.getElementById('quantidade').value;
        
        if (!produto || !quantidade) {
          setMsg('msg', 'Produto e quantidade são obrigatórios!', true);
          return;
        }

        const novoItem = {
          produto,
          tipo: document.getElementById('tipo').value.trim(),
          lote: document.getElementById('lote').value.trim(),
          quantidade: parseInt(quantidade) || 0
        };

        const res = await fetch(`${api}/estoque`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(novoItem)
        });

        if (!res.ok) {
          const error = await res.json().catch(() => null);
          throw new Error(error?.error || 'Falha ao adicionar');
        }

        // Limpa campos
        document.getElementById('produto').value = '';
        document.getElementById('quantidade').value = '';
        
        setMsg('msg', '✔ Produto adicionado!');
        await listar();
      } catch (error) {
        console.error('Erro ao adicionar:', error);
        setMsg('msg', `Erro: ${error.message}`, true);
      }
    }

    // ... (Demais funções de estoque como atualizar, remover, etc.)

    function preencherTabela(data) {
      const tbody = document.querySelector('#tabela tbody');
      tbody.innerHTML = '';

      if (!Object.keys(data).length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Nenhum produto cadastrado</td></tr>';
        return;
      }

      for (const [id, item] of Object.entries(data)) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${id}</td>
          <td>${item.produto || '-'}</td>
          <td>${item.tipo || '-'}</td>
          <td>${item.lote || '-'}</td>
          <td>${item.quantidade || 0}</td>
          <td><button onclick="remover('${id}')" style="background-color: #f44336;">Remover</button></td>
        `;
        tbody.appendChild(tr);
      }
    }

    // Inicialização
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Sistema iniciado');
    });
  </script>
</body>
</html>
