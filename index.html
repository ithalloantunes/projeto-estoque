<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sistema de Estoque – Açaí da Bara</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .hidden { display: none; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    input, button { padding: 6px; margin: 4px; }
  </style>
</head>
<body>
  <h1>Sistema de Estoque – Açaí da Bara</h1>

  <div id="auth">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Usuário" />
    <input id="loginPass" type="password" placeholder="Senha" />
    <button onclick="login()">Entrar</button>
    <h2>Cadastro</h2>
    <input id="regUser" placeholder="Novo usuário" />
    <input id="regPass" type="password" placeholder="Nova senha" />
    <button onclick="register()">Cadastrar</button>
    <p id="authMsg"></p>
  </div>

  <div id="main" class="hidden">
    <button onclick="logout()">Sair</button>
    <h2>Controle de Estoque</h2>
    <div>
      <input id="filtroNome" placeholder="Buscar por produto" />
      <button onclick="buscar()">Buscar</button>
      <button onclick="listar()">Listar Tudo</button>
      <button onclick="relatorio()">Gerar Relatório</button>
    </div>
    <div>
      <h3>Adicionar/Atualizar</h3>
      <input id="produto" placeholder="Produto" />
      <input id="tipo" placeholder="Tipo" />
      <input id="lote" placeholder="Lote" />
      <input id="quantidade" type="number" placeholder="Quantidade" />
      <button onclick="adicionar()">Adicionar</button>
      <button onclick="atualizar()">Atualizar</button>
      <input id="updateId" placeholder="ID para atualizar" />
    </div>
    <h3>Estoque</h3>
    <table id="tabela">
      <thead><tr><th>ID</th><th>Produto</th><th>Tipo</th><th>Lote</th><th>Qtd</th><th>Ações</th></tr></thead>
      <tbody></tbody>
    </table>
    <p id="msg"></p>
  </div>

  <script>
    const api = '/api'; // Modificado para caminho relativo
    let userId = null;
    
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function setMsg(id, txt) { document.getElementById(id).innerText = txt; }

    async function register() {
      try {
        const username = document.getElementById('regUser').value;
        const password = document.getElementById('regPass').value;
        const res = await fetch(`${api}/register`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username, password})
        });
        const json = await res.json();
        setMsg('authMsg', json.error || json.message);
      } catch (error) {
        setMsg('authMsg', 'Erro no cadastro');
      }
    }

    async function login() {
      try {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const res = await fetch(`${api}/login`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username, password}),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error || 'Falha no login');
        }

        const json = await res.json();
        userId = json.userId;
        hide('auth'); 
        show('main');
        listar();
        
      } catch (error) {
        setMsg('authMsg', error.message || 'Erro de conexão');
        console.error('Login error:', error);
      }
    }

    // Restante das funções permanecem igual...
    // ... [O restante do JavaScript permanece inalterado]
  </script>
</body>
</html>
